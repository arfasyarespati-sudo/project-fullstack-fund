<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table List</title>
</head>
<body>
    <!-- Tableview -->
    <table bgcolor="darkblue" width="700">
        <tr bgcolor="grey">
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
            <th>Saturday</th>
            <th>Sunday</th>
        </tr>
        <tr bgcolor="lightgrey">
            <th>Math</th>
            <th>Biology</th>
            <th>Science</th>
            <th>Social</th>
            <th>Art</th>
            <th>Politics</th>
            <th>Religion</th>
        </tr>
    </table>

</body>
</html>
