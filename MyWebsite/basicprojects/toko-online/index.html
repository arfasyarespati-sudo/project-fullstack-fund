<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce | Online Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="container">
                <h1><a href="#">E-Store</a></h1>
                <ul id="menu-list">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#product">Produk</a></li>
                    <li><a href="#about">Tentang Kami</a></li>
                    <li><a href="#contact">Hubungi Kami</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="products-container">
        <section class="featured-products">
            <h2 class="title-main">Produk Favorit</h2>
            <article class="product-card">
                <img src="https://picsum.photos/400/300" alt="Product 1 Image">
                <div class="product-detail">
                    <span class="name">Produk Baru</span><br>
                    <p>Price: $9.99 <small>(Stock: 3)</small></p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </article>
        </section>
    </main>

    <footer><a href="#">© 2026 E-Store Online | All rights reserved.</a></footer>

    <script src="script.js"></script>
</body>

</html>
